<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Out Signage TV</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="tv-page">
  <main id="slideshow-container" aria-live="polite">
    <img id="slide-image" src="" alt="">
    <div id="slide-overlay"></div>
    <div id="slide-text">
      <p id="location-label">Time Out Grand Isle</p>
      <h1 id="headline">Welcome to Time Out</h1>
      <p id="subtext"></p>
    </div>
    <div id="tv-footer">
      <img id="logo" src="images/logo.png" alt="Time Out logo">
      <span>Beachfront Grand Isle getaway</span>
    </div>
    <div id="slide-progress" aria-hidden="true"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
