<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Out Signage Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-page">
  <main class="admin-shell">
    <header class="admin-header">
      <div>
        <p class="eyebrow">Time Out Signage</p>
        <h1>Slide Editor</h1>
        <p>Update the welcome screen, guest notes, and photo rotation for the TV display.</p>
      </div>
      <a class="admin-link" href="index.html" target="_blank" rel="noopener">Preview TV</a>
    </header>
    <section class="admin-toolbar" aria-label="Slide actions">
      <button id="add-slide" type="button">Add Slide</button>
      <button id="copy-slides" type="button">Copy JSON</button>
      <button id="download-slides" type="button">Download slides.json</button>
    </section>
    <p id="status-message" role="status"></p>
    <div id="slides-editor"></div>
  </main>
  <script src="admin.js"></script>
</body>
</html>
